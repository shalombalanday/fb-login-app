<!DOCTYPE html>
<html>
<head>
  <title>Connect Facebook Page</title>
</head>

<body>

<h2>Connect Your Facebook Page 3</h2>

<button onclick="login()">Login with Facebook</button>

<br><br>

<div id="status"></div>
<div id="pages"></div>
<div id="connected"></div>

<script>
const APP_ID = "976267695082878";
const REDIRECT_URI = "https://shalombalanday.github.io/fb-login-app/";

// LOGIN (BEST PRACTICE FOR FRONTEND)
function login() {
  // Clear old token to avoid reuse issues
  localStorage.removeItem("fb_token");

  const url =
    "https://www.facebook.com/v19.0/dialog/oauth" +
    "?client_id=" + APP_ID +
    "&redirect_uri=" + encodeURIComponent(REDIRECT_URI) +
    "&scope=pages_show_list,pages_messaging" +
    "&response_type=code" +
    "&auth_type=rerequest" +
    "&prompt=consent";

  window.location.href = url;
}


// HANDLE TOKEN
window.onload = function () {

  // Extract token from URL hash
  if (window.location.hash.includes("access_token")) {

    const params = new URLSearchParams(window.location.hash.substring(1));
    const token = params.get("access_token");

    if (!token) {
      document.getElementById("status").innerHTML = "❌ Failed to get token";
      return;
    }

    console.log("TOKEN:", token);

    // Save token
    localStorage.setItem("fb_token", token);

    // Clean URL (important for GitHub Pages)
    window.history.replaceState({}, document.title, REDIRECT_URI);

    loadPages(token);

  } else {
    // Try existing token
    const savedToken = localStorage.getItem("fb_token");

    if (savedToken) {
      loadPages(savedToken);
    }
  }
};


// LOAD PAGES
function loadPages(token) {
  document.getElementById("status").innerHTML = "⏳ Fetching your Pages...";

  fetch("https://graph.facebook.com/v19.0/me/accounts?access_token=" + token)
    .then(res => res.json())
    .then(data => {

      console.log("API RESPONSE:", data);

      const container = document.getElementById("pages");
      container.innerHTML = "<h3>Select a Facebook Page</h3>";

      // HANDLE ERROR
      if (data.error) {
        container.innerHTML += "<p>❌ Error: " + data.error.message + "</p>";
        document.getElementById("status").innerHTML = "❌ Failed to load Pages";
        return;
      }

      // NO PAGES CASE
      if (!data.data || data.data.length === 0) {
        container.innerHTML += `
          <p>⚠️ No Pages found.</p>
          <p>Please ensure:</p>
          <ul>
            <li>You are a Page admin</li>
            <li>You selected Pages during login</li>
            <li>You granted all permissions</li>
          </ul>
        `;
        document.getElementById("status").innerHTML = "❌ No Pages available";
        return;
      }

      // SHOW PAGES
      data.data.forEach(page => {

        const btn = document.createElement("button");
        btn.innerText = page.name + " (ID: " + page.id + ")";

        btn.onclick = function () {
          selectPage(page.id, page.access_token, page.name);
        };

        container.appendChild(btn);
        container.appendChild(document.createElement("br"));
        container.appendChild(document.createElement("br"));
      });

      document.getElementById("status").innerHTML = "✅ Pages loaded successfully!";
    })
    .catch(err => {
      console.error(err);
      document.getElementById("status").innerHTML = "❌ Network error";
    });
}


// SELECT PAGE
function selectPage(pageId, pageToken, pageName) {

  document.getElementById("connected").innerHTML = `
    <h3>Connected Page</h3>
    <p><strong>${pageName}</strong></p>
    <p>Status: Active</p>
  `;

  document.getElementById("status").innerHTML = "✅ Page successfully connected!";

  localStorage.setItem("page_id", pageId);
  localStorage.setItem("page_token", pageToken);
  localStorage.setItem("page_name", pageName);
}
</script>

</body>
</html>
