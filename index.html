<!DOCTYPE html>
<html>
<head>
  <title>Connect Facebook Page</title>

  <script async defer crossorigin="anonymous"
    src="https://connect.facebook.net/en_US/sdk.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      text-align: center;
      padding: 40px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #1877f2;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    .page {
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.2s;
    }

    .page:hover {
      background: #f0f2f5;
    }

    .selected {
      border: 2px solid #1877f2;
      background: #e7f0ff;
    }

    .status {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Connect Your Facebook Page Here</h2>

  <button onclick="login()">Login with Facebook</button>

  <div id="status" class="status"></div>

  <h3>Select a Facebook Page</h3>
  <div id="pages"></div>
</div>

<script>
  window.fbAsyncInit = function() {
    FB.init({
      appId      : '976267695082878',
      cookie     : true,
      xfbml      : true,
      version    : 'v19.0'
    });
  };

  function login() {
    FB.login(function(response) {
      if (response.authResponse) {
        document.getElementById("status").innerHTML = "Fetching your Pages...";

        simulatePages();
      } else {
        document.getElementById("status").innerHTML = "❌ Login cancelled";
      }
    }, {
      scope: 'pages_show_list,pages_read_engagement,pages_manage_metadata',
      auth_type: 'rerequest'
    });
  }

  function simulatePages() {
    setTimeout(() => {
      const pagesDiv = document.getElementById("pages");

      pagesDiv.innerHTML = `
        <div class="page" onclick="selectPage(this)">
          <strong>Roxca Realty</strong><br>
          <small>Status: Active</small>
        </div>
      `;

      document.getElementById("status").innerHTML = "Select a Facebook Page";

    }, 1500); // simulate loading
  }

  function selectPage(el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('selected'));
    el.classList.add('selected');

    document.getElementById("status").innerHTML =
      "✅ Connected to Roxca Realty";
  }
</script>

</body>
</html>
