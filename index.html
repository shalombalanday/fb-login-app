<!DOCTYPE html>
<html>
<head>
  <title>Connect Facebook Page</title>
</head>

<body>

<h2>Connect Your Facebook Page</h2>

<button onclick="login()">Login with Facebook</button>

<br><br>

<div id="status"></div>
<div id="pages"></div>
<div id="connected"></div>

<script>
const APP_ID = "976267695082878";

const REDIRECT_URI = encodeURIComponent(
  "https://shalombalanday.github.io/fb-login-app/"
);

// LOGIN
function login() {
  const url =
    "https://www.facebook.com/v19.0/dialog/oauth" +
    "?client_id=" + APP_ID +
    "&redirect_uri=" + REDIRECT_URI +
    "&scope=pages_show_list,pages_messaging" +
    "&response_type=token" +
    "&auth_type=rerequest";

  window.location.href = url;
}


// AFTER LOGIN
window.onload = function () {
  if (window.location.hash.includes("access_token")) {

    document.getElementById("status").innerHTML = "⏳ Fetching your Pages...";

    const token = window.location.hash
      .substring(1)
      .split("&")
      .find(x => x.startsWith("access_token"))
      .split("=")[1];

    getPages(token);
  }
};


// GET PAGES
function getPages(token) {
  fetch("https://graph.facebook.com/v19.0/me/accounts?access_token=" + token)
    .then(res => res.json())
    .then(data => {

      const container = document.getElementById("pages");
      container.innerHTML = "<h3>Select a Facebook Page (retrieved from your account)</h3>";

      data.data.forEach(page => {

        const btn = document.createElement("button");
        btn.innerText = `${page.name} (ID: ${page.id})`;

        // ✅ SAFE CLICK HANDLER (FIXED)
        btn.onclick = function () {
          selectPage(page.id, page.access_token, page.name);
        };

        container.appendChild(btn);
        container.appendChild(document.createElement("br"));
        container.appendChild(document.createElement("br"));
      });

      document.getElementById("status").innerHTML = "✅ Pages loaded successfully!";
    })
    .catch(err => {
      document.getElementById("status").innerHTML = "❌ Error loading pages";
      console.error(err);
    });
}


// SELECT PAGE
function selectPage(pageId, pageToken, pageName) {

  console.log("CLICK WORKED:", pageName);

  document.getElementById("connected").innerHTML = `
    <h3>Connected Page</h3>
    <p><strong>${pageName}</strong></p>
    <p>Status: Active</p>
  `;

  document.getElementById("status").innerHTML = "✅ Page successfully connected!";

  localStorage.setItem("page_id", pageId);
  localStorage.setItem("page_token", pageToken);
  localStorage.setItem("page_name", pageName);
}
</script>

</body>
</html>
