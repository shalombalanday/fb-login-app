<!DOCTYPE html>
<html>
<head>
  <title>Connect Facebook Page</title>
  <script async defer crossorigin="anonymous"
    src="https://connect.facebook.net/en_US/sdk.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      text-align: center;
      padding: 40px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #1877f2;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    .page {
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
      cursor: pointer;
    }

    .page:hover {
      background: #f0f2f5;
    }

    .selected {
      border: 2px solid #1877f2;
      background: #e7f0ff;
    }

    .error {
      color: red;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Connect Your Facebook Page 5</h2>

  <button onclick="login()">Login with Facebook</button>

  <div id="status"></div>

  <h3>Select a Facebook Page</h3>
  <div id="pages"></div>
</div>

<script>
  window.fbAsyncInit = function() {
    FB.init({
      appId      : '976267695082878',
      cookie     : true,
      xfbml      : true,
      version    : 'v19.0'
    });
  };

  function login() {
    FB.login(function(response) {
      if (response.authResponse) {
        document.getElementById("status").innerHTML = "✅ Logged in!";
        getPages();
      } else {
        document.getElementById("status").innerHTML = "❌ Login cancelled";
      }
    }, {
      scope: 'pages_show_list,pages_read_engagement,pages_manage_metadata',
      auth_type: 'rerequest'
    });
  }

  function getPages() {
    FB.api('/me/accounts', function(response) {
      const pagesDiv = document.getElementById("pages");
      pagesDiv.innerHTML = "";

      if (!response || response.error) {
        pagesDiv.innerHTML = '<p class="error">❌ Failed to load Pages</p>';
        console.error(response.error);
        return;
      }

      if (response.data.length === 0) {
        pagesDiv.innerHTML = '<p>⚠️ No Pages found</p>';
        return;
      }

      response.data.forEach(page => {
        const div = document.createElement("div");
        div.className = "page";
        div.innerHTML = `<strong>${page.name}</strong><br>ID: ${page.id}`;

        div.onclick = function() {
          document.querySelectorAll('.page').forEach(p => p.classList.remove('selected'));
          div.classList.add('selected');

          document.getElementById("status").innerHTML =
            `✅ Selected Page: ${page.name}`;
        };

        pagesDiv.appendChild(div);
      });
    });
  }
</script>

</body>
</html>
